name: Release macOS DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git rev-list --count 需要完整历史

      - name: Build & Package DMG (ad-hoc signed)
        working-directory: platforms/macos/client
        run: |
          chmod +x scripts/build.sh scripts/package_dmg.sh
          scripts/package_dmg.sh

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AhaKey Studio ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: |
            platforms/macos/client/dist/AhaKey-Studio-macOS.dmg
