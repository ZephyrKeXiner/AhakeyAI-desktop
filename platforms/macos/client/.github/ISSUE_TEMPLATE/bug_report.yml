name: Bug report
description: Report a reproducible issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Open AhaKey Studio
        2. Connect device
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5"
  - type: input
    id: xcode
    attributes:
      label: Xcode version
      placeholder: "15.4"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant BLE/app logs. Remove secrets before posting.
      render: text
