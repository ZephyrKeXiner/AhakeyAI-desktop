name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or API you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - BLE / hardware
        - AhaKey Studio UI
        - VoiceAgent
        - Feishu integration
        - Build / packaging
        - Documentation
        - Other
  - type: textarea
    id: notes
    attributes:
      label: Additional context
